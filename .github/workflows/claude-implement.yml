name: "OpenSDD: Implement Spec"

on:
  repository_dispatch:
    types: [implement-spec]
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    if: |
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'implement-spec')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            let metadata;
            if (context.eventName === 'repository_dispatch') {
              const p = context.payload.client_payload;
              metadata = {
                'package-name': p.package_name || '',
                'package-path': p.package_path || '',
                'specs-dir': p.specs_dir || 'opensdd',
                'spec-pr': String(p.spec_pr || ''),
              };
            } else {
              const body = context.payload.issue.body || '';
              const match = body.match(/<!--\s*opensdd\n([\s\S]*?)-->/);
              if (!match) {
                core.setFailed('No OpenSDD metadata block found in issue body');
                return;
              }
              const lines = match[1].trim().split('\n');
              metadata = {};
              for (const line of lines) {
                const [key, ...rest] = line.split(':');
                metadata[key.trim()] = rest.join(':').trim();
              }
            }
            core.setOutput('package-name', metadata['package-name'] || '');
            core.setOutput('package-path', metadata['package-path'] || '');
            core.setOutput('specs-dir', metadata['specs-dir'] || 'opensdd');
            core.setOutput('spec-pr', metadata['spec-pr'] || '');

      - name: Implement with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6"
          show_full_output: true
          prompt: |
            A spec change was merged in PR #${{ steps.metadata.outputs.spec-pr }}. Your job is to implement ONLY the changes from that PR — not the entire spec.

            Package: ${{ steps.metadata.outputs.package-name }}
            Package path: ${{ steps.metadata.outputs.package-path }}
            Specs dir: ${{ steps.metadata.outputs.specs-dir }}

            Instructions:
            1. Navigate to the package path (if set): cd ${{ steps.metadata.outputs.package-path || '.' }}
            2. Run `gh pr diff ${{ steps.metadata.outputs.spec-pr }}` to see exactly what changed in the spec
            3. Read the full spec files in the specs directory for context, but scope your implementation to ONLY the behaviors added or modified in the PR diff
            4. Implement the changes following the behavioral contract, including tests for the new/changed behaviors
            5. Create a new branch, commit your changes, push, and open a PR:
               - Branch: `implement/${{ steps.metadata.outputs.package-name }}/${{ steps.metadata.outputs.spec-pr }}`
               - Commit message: `implement(${{ steps.metadata.outputs.package-name }}): changes from spec PR #${{ steps.metadata.outputs.spec-pr }}`
               - Open the PR with `gh pr create` targeting `main`, referencing spec PR #${{ steps.metadata.outputs.spec-pr }} in the body

  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Respond with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6"
